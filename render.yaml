databases:
  - name: finanzen-db
    plan: free
    databaseName: finanzen
    user: finanzen

services:
  - type: web
    name: finanzen
    runtime: python
    pythonVersion: "3.13.13"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: finanzen-db
          property: connectionString
      - key: PLUGGY_CLIENT_ID
        sync: false
      - key: PLUGGY_CLIENT_SECRET
        sync: false
      - key: COOKIE_SECURE
        value: "1"
    disk:
      name: finanzen-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
